[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Do not run any release jobs on pull requests. The separate ci.yml
# workflow already covers fmt/clippy/test on PRs, so cargo-dist's
# release workflow should only fire on tag pushes.
pr-run-mode = "skip"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Homebrew tap repository to publish the formula to
tap = "techarm/homebrew-tap"
# GitHub publish jobs: write the formula back to the tap repo
publish-jobs = ["homebrew"]

# System dependencies needed by mozjpeg
[dist.dependencies.apt]
cmake = "*"
nasm = "*"
pkg-config = "*"
libclang-dev = "*"

[dist.dependencies.homebrew]
cmake = "*"
nasm = "*"
