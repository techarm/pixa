# Pattern/texture generation prompt configuration
# Matches nanobanana buildPatternPrompt() - index.ts:573-590

[defaults]
type = "seamless"
style = "abstract"
density = "medium"
colors = "colorful"
size = "256x256"
format = "png"

[prompt]
base = "{prompt}, {style} style {type} pattern, {density} density, {colors} colors"
# Added only when type == "seamless"
seamless_suffix = ", tileable, repeating pattern"
tail = ", {size} tile size, high quality"
