# Icon generation prompt configuration
# Matches nanobanana buildIconPrompt() - index.ts:551-571

[defaults]
sizes = [256]
type = "app-icon"
style = "modern"
background = "transparent"
corners = "rounded"
format = "png"

[prompt]
# Template: {prompt}, {style} style {type}
base = "{prompt}, {style} style {type}"
# Added only when type == "app-icon"
app_icon_suffix = ", {corners} corners"
# Added only when background != "transparent"
background_suffix = ", {background} background"
# Always appended at the end
tail = ", clean design, high quality, professional"
