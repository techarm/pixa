# Technical diagram generation prompt configuration
# Matches nanobanana buildDiagramPrompt() - index.ts:592-607

[defaults]
type = "flowchart"
style = "professional"
layout = "hierarchical"
complexity = "detailed"
colors = "accent"
annotations = "detailed"
format = "png"

[prompt]
base = "{prompt}, {type} diagram, {style} style, {layout} layout"
detail = ", {complexity} level of detail, {colors} color scheme"
annotation = ", {annotations} annotations and labels"
tail = ", clean technical illustration, clear visual hierarchy"
