<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pixa - Image Processing Toolkit</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e4e6f0; --text-dim: #8b8fa3; --accent: #6c8cff;
    --accent-hover: #8ba4ff; --success: #4ade80; --error: #f87171;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 1.5rem;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .tabs {
    display: flex; gap: 0.25rem; margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.5rem 1rem; border: none; background: none;
    color: var(--text-dim); cursor: pointer; border-radius: 6px 6px 0 0;
    font-size: 0.85rem; transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active { color: var(--accent); background: var(--surface); font-weight: 500; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
  }
  .drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 2.5rem; text-align: center; cursor: pointer;
    transition: all 0.2s; background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent); background: rgba(108,140,255,0.05);
  }
  .drop-zone p { color: var(--text-dim); font-size: 0.9rem; }
  .drop-zone .icon { font-size: 2rem; margin-bottom: 0.5rem; }
  input[type="file"] { display: none; }
  .preview { margin-top: 1rem; text-align: center; }
  .preview img {
    max-width: 100%; max-height: 400px; border-radius: 6px;
    border: 1px solid var(--border);
  }
  .controls { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
  .btn {
    padding: 0.6rem 1.25rem; border: none; border-radius: 6px;
    font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #363a4a; }
  label { font-size: 0.8rem; color: var(--text-dim); }
  select, input[type="number"] {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 0.4rem 0.6rem; border-radius: 4px;
    font-size: 0.85rem;
  }
  .result {
    margin-top: 1rem; padding: 1rem; border-radius: 6px;
    font-size: 0.85rem; display: none;
  }
  .result.success { display: block; background: rgba(74,222,128,0.1); border: 1px solid var(--success); }
  .result.error { display: block; background: rgba(248,113,113,0.1); border: 1px solid var(--error); color: var(--error); }
  .info-grid {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 0.35rem 1rem; font-size: 0.85rem;
  }
  .info-grid dt { color: var(--text-dim); }
  .info-grid dd { word-break: break-all; }
  .spinner { display: none; }
  .spinner.active { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .exif-table { margin-top: 0.75rem; font-size: 0.8rem; }
  .exif-table summary { cursor: pointer; color: var(--accent); }
  .exif-table table { width: 100%; margin-top: 0.5rem; border-collapse: collapse; }
  .exif-table td { padding: 0.2rem 0.5rem; border-bottom: 1px solid var(--border); }
  .exif-table td:first-child { color: var(--text-dim); white-space: nowrap; }
</style>
</head>
<body>

<h1>🖼️ pixa</h1>
<p class="subtitle">Rust 製画像処理ツールキット — Watermark 削除 · 圧縮 · 変換 · 情報表示 · プロンプト生成</p>

<div class="tabs">
  <button class="tab active" data-tab="watermark">🗑️ Watermark 削除</button>
  <button class="tab" data-tab="compress">📦 軽量化</button>
  <button class="tab" data-tab="convert">🔄 形式変換</button>
  <button class="tab" data-tab="info">ℹ️ 情報表示</button>
  <button class="tab" data-tab="prompt">✨ プロンプト生成</button>
</div>

<!-- Watermark Removal -->
<div class="panel active" id="tab-watermark">
  <div class="card">
    <div class="drop-zone" id="wm-drop">
      <div class="icon">🎯</div>
      <p>画像をドラッグ＆ドロップ、またはクリックで選択</p>
      <p style="font-size:0.75rem;margin-top:0.25rem">Gemini 生成画像の透かしを数学的に除去します</p>
      <input type="file" id="wm-file" accept="image/*">
    </div>
    <div class="preview" id="wm-preview"></div>
    <div class="controls">
      <label>サイズ:
        <select id="wm-size">
          <option value="">自動検出</option>
          <option value="small">Small (48×48)</option>
          <option value="large">Large (96×96)</option>
        </select>
      </label>
      <button class="btn btn-primary" id="wm-run" disabled>Watermark を削除</button>
      <button class="btn btn-secondary" id="wm-detect" disabled>検出のみ</button>
      <span class="spinner" id="wm-spinner">⏳</span>
    </div>
    <div class="result" id="wm-result"></div>
    <div class="preview" id="wm-output"></div>
  </div>
</div>

<!-- Compress -->
<div class="panel" id="tab-compress">
  <div class="card">
    <div class="drop-zone" id="comp-drop">
      <div class="icon">📦</div>
      <p>圧縮する画像をドラッグ＆ドロップ</p>
      <input type="file" id="comp-file" accept="image/*">
    </div>
    <div class="preview" id="comp-preview"></div>
    <div class="controls">
      <label>品質: <input type="number" id="comp-quality" min="1" max="100" value="80" style="width:60px"></label>
      <label>最大幅: <input type="number" id="comp-maxw" placeholder="なし" style="width:80px"></label>
      <label>最大高: <input type="number" id="comp-maxh" placeholder="なし" style="width:80px"></label>
      <button class="btn btn-primary" id="comp-run" disabled>圧縮する</button>
      <span class="spinner" id="comp-spinner">⏳</span>
    </div>
    <div class="result" id="comp-result"></div>
  </div>
</div>

<!-- Convert -->
<div class="panel" id="tab-convert">
  <div class="card">
    <div class="drop-zone" id="conv-drop">
      <div class="icon">🔄</div>
      <p>変換する画像をドラッグ＆ドロップ</p>
      <input type="file" id="conv-file" accept="image/*">
    </div>
    <div class="preview" id="conv-preview"></div>
    <div class="controls">
      <label>出力形式:
        <select id="conv-format">
          <option value="png">PNG</option>
          <option value="jpg">JPEG</option>
          <option value="webp">WebP</option>
          <option value="bmp">BMP</option>
          <option value="gif">GIF</option>
        </select>
      </label>
      <button class="btn btn-primary" id="conv-run" disabled>変換する</button>
      <span class="spinner" id="conv-spinner">⏳</span>
    </div>
    <div class="result" id="conv-result"></div>
  </div>
</div>

<!-- Info -->
<div class="panel" id="tab-info">
  <div class="card">
    <div class="drop-zone" id="info-drop">
      <div class="icon">ℹ️</div>
      <p>情報を表示する画像をドラッグ＆ドロップ</p>
      <input type="file" id="info-file" accept="image/*">
    </div>
    <div class="preview" id="info-preview"></div>
    <div id="info-data" style="margin-top:1rem"></div>
  </div>
</div>

<!-- Prompt Generation -->
<div class="panel" id="tab-prompt">
  <div class="card">
    <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:1rem">
      ローカルの AI CLI (claude / gemini) を使って Nanobanana 向けの画像生成プロンプトを生成します
    </p>
    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <label style="font-size:0.8rem;color:var(--text-dim)">テキスト指示
        <textarea id="pr-desc" rows="3" placeholder="例: 猫が宇宙で浮いてる絵、星雲の背景" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:6px;font-size:0.85rem;resize:vertical;margin-top:0.25rem"></textarea>
      </label>
      <div>
        <label style="font-size:0.8rem;color:var(--text-dim)">参考画像（オプション）</label>
        <div class="drop-zone" id="pr-drop" style="padding:1rem;margin-top:0.25rem">
          <p style="font-size:0.8rem">参考画像をドラッグ＆ドロップ（類似プロンプトを生成）</p>
          <input type="file" id="pr-file" accept="image/*">
        </div>
        <div class="preview" id="pr-preview" style="margin-top:0.5rem"></div>
      </div>
      <div class="controls" style="margin-top:0">
        <label>プロバイダー:
          <select id="pr-provider">
            <option value="">自動検出</option>
            <option value="claude">Claude</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>
        <label>スタイル:
          <select id="pr-style">
            <option value="">指定なし</option>
            <option value="photorealistic">写実的</option>
            <option value="anime">アニメ</option>
            <option value="digital painting">デジタルペイント</option>
            <option value="watercolor">水彩画</option>
            <option value="oil painting">油絵</option>
            <option value="pixel art">ピクセルアート</option>
            <option value="3D render">3D レンダー</option>
            <option value="Studio Ghibli">ジブリ風</option>
          </select>
        </label>
        <label>比率:
          <select id="pr-ratio">
            <option value="">指定なし</option>
            <option value="1:1">1:1</option>
            <option value="16:9">16:9</option>
            <option value="9:16">9:16</option>
            <option value="4:3">4:3</option>
            <option value="3:2">3:2</option>
          </select>
        </label>
        <label>バリエーション:
          <select id="pr-vars">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
          </select>
        </label>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center">
        <button class="btn btn-primary" id="pr-run">✨ プロンプト生成</button>
        <span class="spinner" id="pr-spinner">⏳</span>
        <span id="pr-provider-status" style="font-size:0.75rem;color:var(--text-dim)"></span>
      </div>
    </div>
    <div class="result" id="pr-result"></div>
    <div id="pr-output" style="margin-top:0.75rem"></div>
  </div>
</div>

<script>
// === Tab switching ===
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// === Shared helpers ===
function setupDropZone(dropId, fileId, previewId, onFile) {
  const drop = document.getElementById(dropId);
  const input = document.getElementById(fileId);

  drop.addEventListener('click', () => input.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', () => { if (input.files.length) handleFile(input.files[0]); });

  function handleFile(file) {
    const prev = document.getElementById(previewId);
    prev.innerHTML = `<img src="${URL.createObjectURL(file)}" alt="Preview">`;
    onFile(file);
  }
}

function showResult(id, msg, ok) {
  const el = document.getElementById(id);
  el.className = 'result ' + (ok ? 'success' : 'error');
  el.textContent = msg;
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// === Watermark ===
let wmFile = null;
setupDropZone('wm-drop', 'wm-file', 'wm-preview', f => {
  wmFile = f;
  document.getElementById('wm-run').disabled = false;
  document.getElementById('wm-detect').disabled = false;
  document.getElementById('wm-result').className = 'result';
  document.getElementById('wm-output').innerHTML = '';
});

document.getElementById('wm-detect').addEventListener('click', async () => {
  if (!wmFile) return;
  const spin = document.getElementById('wm-spinner');
  spin.classList.add('active');
  try {
    const form = new FormData();
    form.append('file', wmFile);
    const res = await fetch('/api/detect-watermark', { method: 'POST', body: form });
    const data = await res.json();
    const msg = data.detected
      ? `✅ Watermark 検出 (信頼度: ${(data.confidence*100).toFixed(1)}%, サイズ: ${data.size})`
      : `❌ Watermark 未検出 (信頼度: ${(data.confidence*100).toFixed(1)}%)`;
    showResult('wm-result', msg, true);
  } catch(e) { showResult('wm-result', 'エラー: ' + e.message, false); }
  spin.classList.remove('active');
});

document.getElementById('wm-run').addEventListener('click', async () => {
  if (!wmFile) return;
  const spin = document.getElementById('wm-spinner');
  const btn = document.getElementById('wm-run');
  spin.classList.add('active'); btn.disabled = true;
  try {
    const form = new FormData();
    form.append('file', wmFile);
    const size = document.getElementById('wm-size').value;
    const url = '/api/remove-watermark' + (size ? `?force_size=${size}` : '');
    const res = await fetch(url, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const objUrl = URL.createObjectURL(blob);
    document.getElementById('wm-output').innerHTML =
      `<img src="${objUrl}" alt="Result"><br>` +
      `<button class="btn btn-secondary" onclick="downloadBlob(new Blob(['${objUrl}']),'')" style="margin-top:0.5rem">` +
      `ダウンロード</button>`;
    // Fix download with actual blob
    const dlBtn = document.getElementById('wm-output').querySelector('button');
    dlBtn.onclick = () => downloadBlob(blob, 'cleaned_' + wmFile.name);
    showResult('wm-result', '✅ Watermark を削除しました', true);
  } catch(e) { showResult('wm-result', 'エラー: ' + e.message, false); }
  spin.classList.remove('active'); btn.disabled = false;
});

// === Compress ===
let compFile = null;
setupDropZone('comp-drop', 'comp-file', 'comp-preview', f => {
  compFile = f;
  document.getElementById('comp-run').disabled = false;
  document.getElementById('comp-result').className = 'result';
});

document.getElementById('comp-run').addEventListener('click', async () => {
  if (!compFile) return;
  const spin = document.getElementById('comp-spinner');
  spin.classList.add('active');
  try {
    const form = new FormData();
    form.append('file', compFile);
    const q = document.getElementById('comp-quality').value;
    const mw = document.getElementById('comp-maxw').value;
    const mh = document.getElementById('comp-maxh').value;
    let params = `?quality=${q}`;
    if (mw) params += `&max_width=${mw}`;
    if (mh) params += `&max_height=${mh}`;
    const res = await fetch('/api/compress' + params, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const info = res.headers.get('x-compress-result');
    const blob = await res.blob();
    let msg = '✅ 圧縮完了';
    if (info) {
      const d = JSON.parse(info);
      msg += ` — ${fmtSize(d.original_size)} → ${fmtSize(d.compressed_size)} (${d.savings_percent.toFixed(1)}% 削減)`;
    }
    showResult('comp-result', msg, true);
    downloadBlob(blob, 'compressed_' + compFile.name);
  } catch(e) { showResult('comp-result', 'エラー: ' + e.message, false); }
  spin.classList.remove('active');
});

// === Convert ===
let convFile = null;
setupDropZone('conv-drop', 'conv-file', 'conv-preview', f => {
  convFile = f;
  document.getElementById('conv-run').disabled = false;
  document.getElementById('conv-result').className = 'result';
});

document.getElementById('conv-run').addEventListener('click', async () => {
  if (!convFile) return;
  const spin = document.getElementById('conv-spinner');
  spin.classList.add('active');
  try {
    const form = new FormData();
    form.append('file', convFile);
    const fmt = document.getElementById('conv-format').value;
    const res = await fetch(`/api/convert?format=${fmt}`, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const base = convFile.name.replace(/\.[^.]+$/, '');
    downloadBlob(blob, `${base}.${fmt}`);
    showResult('conv-result', `✅ ${fmt.toUpperCase()} に変換しました`, true);
  } catch(e) { showResult('conv-result', 'エラー: ' + e.message, false); }
  spin.classList.remove('active');
});

// === Info ===
setupDropZone('info-drop', 'info-file', 'info-preview', async f => {
  const container = document.getElementById('info-data');
  container.innerHTML = '⏳ 読み込み中...';
  try {
    const form = new FormData();
    form.append('file', f);
    const res = await fetch('/api/info', { method: 'POST', body: form });
    const d = await res.json();
    let html = '<dl class="info-grid">';
    html += `<dt>ファイル名</dt><dd>${d.file_name}</dd>`;
    html += `<dt>フォーマット</dt><dd>${d.format}</dd>`;
    html += `<dt>サイズ</dt><dd>${d.file_size_human} (${d.file_size.toLocaleString()} bytes)</dd>`;
    html += `<dt>寸法</dt><dd>${d.width} × ${d.height}</dd>`;
    html += `<dt>ピクセル数</dt><dd>${d.pixel_count.toLocaleString()}</dd>`;
    html += `<dt>カラー</dt><dd>${d.color_type}</dd>`;
    html += `<dt>ビット深度</dt><dd>${d.bit_depth}</dd>`;
    html += `<dt>アルファ</dt><dd>${d.has_alpha ? 'あり' : 'なし'}</dd>`;
    html += `<dt>SHA-256</dt><dd style="font-family:monospace;font-size:0.75rem">${d.sha256}</dd>`;
    html += '</dl>';
    if (d.exif && Object.keys(d.exif).length) {
      html += '<details class="exif-table"><summary>EXIF データ (' + Object.keys(d.exif).length + ' fields)</summary><table>';
      Object.entries(d.exif).sort().forEach(([k,v]) => { html += `<tr><td>${k}</td><td>${v}</td></tr>`; });
      html += '</table></details>';
    }
    container.innerHTML = html;
  } catch(e) { container.innerHTML = `<span style="color:var(--error)">エラー: ${e.message}</span>`; }
});

function fmtSize(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b/1024).toFixed(1) + 'KB';
  return (b/1048576).toFixed(1) + 'MB';
}

// === Prompt Generation ===
let prFile = null;

// Setup drop zone for reference image
(function() {
  const drop = document.getElementById('pr-drop');
  const input = document.getElementById('pr-file');
  drop.addEventListener('click', () => input.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('dragover');
    if (e.dataTransfer.files.length) setPrFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', () => { if (input.files.length) setPrFile(input.files[0]); });
  function setPrFile(file) {
    prFile = file;
    document.getElementById('pr-preview').innerHTML = `<img src="${URL.createObjectURL(file)}" alt="Reference" style="max-height:200px">`;
  }
})();

// Check available providers on tab open
document.querySelector('[data-tab="prompt"]').addEventListener('click', async () => {
  try {
    const res = await fetch('/api/prompt/providers');
    const data = await res.json();
    const status = document.getElementById('pr-provider-status');
    if (data.providers.length === 0) {
      status.textContent = '⚠️ 利用可能な AI CLI がありません (claude / gemini をインストールしてください)';
      status.style.color = 'var(--error)';
    } else {
      const names = data.providers.map(p => p.id).join(', ');
      status.textContent = `✓ 利用可能: ${names}`;
      status.style.color = 'var(--success)';
    }
  } catch(e) { /* ignore */ }
});

document.getElementById('pr-run').addEventListener('click', async () => {
  const desc = document.getElementById('pr-desc').value.trim();
  if (!desc && !prFile) {
    showResult('pr-result', 'テキスト指示か参考画像のどちらかを入力してください', false);
    return;
  }

  const spin = document.getElementById('pr-spinner');
  const btn = document.getElementById('pr-run');
  spin.classList.add('active'); btn.disabled = true;
  document.getElementById('pr-output').innerHTML = '';
  document.getElementById('pr-result').className = 'result';

  try {
    const provider = document.getElementById('pr-provider').value;
    const style = document.getElementById('pr-style').value;
    const ratio = document.getElementById('pr-ratio').value;
    const vars = document.getElementById('pr-vars').value;

    let params = new URLSearchParams();
    if (desc) params.set('description', desc);
    if (provider) params.set('provider', provider);
    if (style) params.set('style', style);
    if (ratio) params.set('ratio', ratio);
    params.set('variations', vars);

    let fetchOpts = { method: 'POST' };

    // Include reference image if provided
    if (prFile) {
      const form = new FormData();
      form.append('file', prFile);
      fetchOpts.body = form;
    }

    const res = await fetch('/api/prompt?' + params.toString(), fetchOpts);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Unknown error');
    }

    const data = await res.json();
    showResult('pr-result', `✅ ${data.provider} でプロンプトを生成しました`, true);

    // Display prompts
    let html = '';
    data.prompts.forEach((p, i) => {
      html += `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.75rem;margin-bottom:0.5rem">`;
      if (data.prompts.length > 1) {
        html += `<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:0.35rem">Variation ${i+1}</div>`;
      }
      html += `<div style="font-size:0.85rem;line-height:1.5;user-select:all">${escHtml(p)}</div>`;
      html += `<button class="btn btn-secondary" style="margin-top:0.5rem;font-size:0.75rem;padding:0.3rem 0.75rem" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent).then(()=>{this.textContent='✓ コピー済み';setTimeout(()=>this.textContent='📋 コピー',1500)})">📋 コピー</button>`;
      html += `</div>`;
    });
    document.getElementById('pr-output').innerHTML = html;

  } catch(e) {
    showResult('pr-result', 'エラー: ' + e.message, false);
  }
  spin.classList.remove('active'); btn.disabled = false;
});

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
