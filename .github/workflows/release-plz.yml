name: Release-plz

# Runs on every push to main. release-plz will:
#   1. Open (or update) a "release PR" that bumps Cargo.toml version
#      and updates CHANGELOG.md based on conventional commits.
#   2. When that PR is merged, create a git tag and publish to crates.io.
#
# The git tag triggers .github/workflows/release.yml (cargo-dist),
# which builds prebuilt binaries, updates the Homebrew tap, and
# creates the GitHub Release.

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
