[workspace]
# Create a single release PR for the whole workspace (we have one crate).
# When the PR is merged, release-plz will create a git tag and publish
# to crates.io automatically.
release = true
git_tag_enable = true
git_release_enable = false  # cargo-dist creates the GitHub Release, not release-plz
publish = true              # auto-publish to crates.io when release PR is merged

# Changelog polish. We intentionally keep release-plz's default version
# section rendering (the previous attempt at a full custom template
# broke the `## [version] - date` headers), and only add a small
# commit-subject preprocessor so every auto-generated entry matches the
# sentence-case, terminal-period style of the hand-polished earlier
# releases without requiring a manual edit on each release PR.
[changelog]
commit_preprocessors = [
    # Capitalise only the first character of the commit SUBJECT, leaving
    # the `type(scope)!: ` conventional-commit prefix untouched.
    #
    # Why this matters: `commit_preprocessors` run BEFORE git-cliff's
    # conventional-commit parser. A naive `perl -pe 's/^(.)/\U$1/'`
    # uppercases the type (`fix` → `Fix`), which then fails to match
    # release-plz's default `^fix` parser and drops the entry into
    # `### Other` instead of `### Fixed`. That's how the 0.1.6 release
    # PR ended up with `- *(CONVERT)* PRESERVE ALPHA ...` under
    # `### Other` instead of `- *(convert)* Preserve alpha ...` under
    # `### Fixed`.
    #
    # The pattern gates the command to commits that look like a
    # conventional-commit subject whose body starts lowercase. The
    # perl substitution preserves the prefix (group 1) and only
    # uppercases the first body character (group 2). Perl is
    # preinstalled on ubuntu-latest runners and macOS.
    { pattern = '^[a-z]+(\([^)]+\))?!?:\s+[a-z]', replace_command = '''perl -pe 's/^([a-z]+(?:\([^)]+\))?!?:\s+)([a-z])/$1\U$2/' ''' },
    # Ensure the subject ends with a period so the generated entry
    # reads as a complete sentence, matching the hand-polished style
    # of earlier releases. Subjects that already end in terminal
    # punctuation are left alone.
    { pattern = '([^.!?\s])\s*$', replace = '$1.' },
    # Turn plain `(#NN)` PR references into markdown links, matching
    # the hand-polished style of 0.1.3–0.1.5 entries (e.g.
    # `([#9](https://github.com/techarm/pixa/pull/9))`). Copilot flags
    # the inconsistency on every release PR otherwise. A preprocessor
    # is sufficient — no custom body template needed (the custom-body
    # approach previously broke the `## [version] - date` headers and
    # was reverted in #4 / #8).
    { pattern = '\(#(\d+)\)', replace = '([#$1](https://github.com/techarm/pixa/pull/$1))' },
]
