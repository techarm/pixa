[workspace]
# Create a single release PR for the whole workspace (we have one crate).
# When the PR is merged, release-plz will create a git tag and publish
# to crates.io automatically.
release = true
git_tag_enable = true
git_release_enable = false  # cargo-dist creates the GitHub Release, not release-plz
publish = true              # auto-publish to crates.io when release PR is merged

# Changelog polish. We intentionally keep release-plz's default version
# section rendering (the previous attempt at a full custom template
# broke the `## [version] - date` headers), and only add a small
# commit-subject preprocessor so every auto-generated entry matches the
# sentence-case, terminal-period style of the hand-polished earlier
# releases without requiring a manual edit on each release PR.
[changelog]
commit_preprocessors = [
    # Upper-case the first character of each commit subject via
    # git-cliff's `replace_command`. `tr` is portable across every
    # environment where release-plz runs (GitHub Actions, local dev).
    { pattern = '^[a-z]', replace_command = 'tr "[:lower:]" "[:upper:]"' },
    # Ensure the subject ends with a period so the generated entry
    # reads as a complete sentence, matching the hand-polished style
    # of earlier releases. Subjects that already end in terminal
    # punctuation are left alone.
    { pattern = '([^.!?\s])\s*$', replace = '$1.' },
]
