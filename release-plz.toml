[workspace]
# Create a single release PR for the whole workspace (we have one crate).
# When the PR is merged, release-plz will create a git tag and publish
# to crates.io automatically.
release = true
git_tag_enable = true
git_release_enable = false  # cargo-dist creates the GitHub Release, not release-plz
publish = true              # auto-publish to crates.io when release PR is merged

# Use release-plz's default changelog generation (powered by git-cliff).
# No custom [changelog] template — the default correctly creates
# ## [version] - date section headers, which our custom template was
# breaking (putting entries under [Unreleased] without a version header).
